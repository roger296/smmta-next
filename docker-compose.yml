services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smmta
      POSTGRES_PASSWORD: smmta
      POSTGRES_DB: smmta_next
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts run once on first cluster bootstrap. Adds the
      # `smmta_store` database alongside `smmta_next` (Prompt 7 of
      # buldmeawebstore.md). To create the second database on an
      # existing volume, run:
      #   docker compose exec postgres psql -U smmta -c 'CREATE DATABASE smmta_store;'
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smmta -d smmta_next']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
