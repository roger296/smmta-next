# Nginx server block for the Filament Store storefront.
#
# Goals:
#   - Terminate TLS at nginx; proxy plaintext to 127.0.0.1:3000.
#   - Long-cache `_next/static` (immutable hashed assets).
#   - Trust X-Forwarded-Proto / X-Forwarded-Host so Next renders
#     correct absolute URLs (canonical, OG, sitemap).
#   - Keep `cleverdeals.com` parent config completely untouched.
#
# Pre-flight (run once on the host — DNS first, then certbot):
#
#   # 1. Confirm DNS A/AAAA for filament.shop.cleverdeals.com → this VPS.
#   # 2. Drop this file:
#   sudo cp infra/nginx/filament.shop.cleverdeals.com.conf \
#       /etc/nginx/sites-available/filament.shop.cleverdeals.com.conf
#   sudo ln -s ../sites-available/filament.shop.cleverdeals.com.conf \
#       /etc/nginx/sites-enabled/filament.shop.cleverdeals.com.conf
#   sudo nginx -t   # must say "syntax is ok / test is successful"
#   sudo systemctl reload nginx
#   # 3. Issue + auto-renew the cert. certbot edits this file in place
#   #    (`# managed by Certbot` markers).
#   sudo certbot --nginx -d filament.shop.cleverdeals.com
#
# After issuance certbot adds the listen 443 ssl block + cert paths;
# the HTTP block below redirects everything to HTTPS.

# ---------------------------------------------------------------------
# HTTP → HTTPS redirect.
# ---------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name filament.shop.cleverdeals.com;

    # certbot's HTTP-01 challenge needs unredirected /.well-known/.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------
# HTTPS — proxy to the local Next standalone server on :3000.
# (certbot will append `listen 443 ssl;` + cert paths after issuance.)
# ---------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name filament.shop.cleverdeals.com;

    # Filled in by certbot:
    # ssl_certificate     /etc/letsencrypt/live/filament.shop.cleverdeals.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/filament.shop.cleverdeals.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Storefront emits its own security headers (next.config.js); nginx
    # adds HSTS at the edge so even pre-app responses (errors, 444s)
    # carry it. Long max-age is fine — the storefront is HTTPS only.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size — uploads are not used today; keep it small to limit
    # abuse. Mollie / SendGrid webhooks are well under a kilobyte.
    client_max_body_size 1m;

    # Trust the upstream Next server for X-Forwarded-* propagation; we
    # set them ourselves below so it doesn't matter what the client
    # sent.

    # ----------- long-cache the immutable Next assets -----------------
    location ^~ /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        # Hashed asset names are content-addressed → safe to cache forever.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Image optimiser output also has a stable hash in its query.
    location ^~ /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ----------- everything else → Next.js ----------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        # Sensible timeouts — Mollie webhooks and admin actions can
        # take a moment when the upstream API does its commit work.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Friendly health-check passthrough — handy for external monitors.
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:3000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
